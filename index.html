<section id="about-skills">
  <h2>About Me & Skills</h2>
  <div class="about-skills-container">
    <p class="about-text">
      Passionate software developer with expertise in automation, web, mobile, and cloud technologies.
    </p>

    <!-- Floating Badges -->
    <div class="badges-animated">
      <span class="badge">📚 Fundamentals 💯</span>
      <span class="badge">💻 C# & Python 💯</span>
      <span class="badge">📱 Android App for IoT</span>
      <span class="badge">🌐 Web App in Cloud (Azure) 👍</span>
      <span class="badge">🔐 Security Best Practices 👍</span>
    </div>

    <!-- Floating Tech Icons -->
    <div class="tech-animation">
      <img src="https://skillicons.dev/icons?i=python" alt="Python" class="tech-icon">
      <img src="https://skillicons.dev/icons?i=csharp" alt="C#" class="tech-icon">
      <img src="https://skillicons.dev/icons?i=mssql" alt="MS SQL" class="tech-icon">
      <img src="https://skillicons.dev/icons?i=selenium" alt="Selenium" class="tech-icon">
      <img src="https://skillicons.dev/icons?i=postman" alt="Postman" class="tech-icon">
    </div>

    <!-- Moving Background Circles -->
    <div class="dynamic-circles"></div>
  </div>
</section>

<style>
.about-skills-container {
  position: relative;
  text-align: center;
  padding: 60px 20px;
  overflow: hidden;
  background: #fdfdfd;
  border-radius: 15px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
}

/* Animated Badges */
.badges-animated {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  margin-bottom: 50px;
}
.badges-animated .badge {
  background: #f0f0f0;
  padding: 10px 18px;
  border-radius: 25px;
  font-weight: 500;
  transition: transform 0.3s, background 0.3s, color 0.3s;
}
.badges-animated .badge:hover {
  transform: scale(1.2) rotate(5deg);
  background: #0077B5;
  color: white;
}

/* Tech Icons */
.tech-animation {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 25px;
  margin-bottom: 50px;
}
.tech-icon {
  width: 60px;
  transition: transform 0.5s, box-shadow 0.3s;
}
.tech-icon:hover {
  transform: scale(1.3);
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

/* Dynamic Circles Container */
.dynamic-circles {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none; /* Allow clicks on badges/icons */
}

/* Circle style */
.dynamic-circles .circle {
  position: absolute;
  border-radius: 50%;
  background: rgba(0, 119, 181, 0.15);
  width: 50px;
  height: 50px;
}
</style>

<script>
// Auto-move circles randomly over time
const container = document.querySelector('.dynamic-circles');

function createCircle() {
  const circle = document.createElement('div');
  circle.classList.add('circle');
  container.appendChild(circle);

  // Random start position
  let x = Math.random() * container.offsetWidth;
  let y = Math.random() * container.offsetHeight;

  circle.style.left = x + 'px';
  circle.style.top = y + 'px';

  // Random movement speed
  const speedX = (Math.random() - 0.5) * 0.5; // px per frame
  const speedY = (Math.random() - 0.5) * 0.5;

  function animate() {
    x += speedX;
    y += speedY;

    // Wrap around edges
    if (x > container.offsetWidth) x = 0;
    if (x < 0) x = container.offsetWidth;
    if (y > container.offsetHeight) y = 0;
    if (y < 0) y = container.offsetHeight;

    circle.style.left = x + 'px';
    circle.style.top = y + 'px';

    requestAnimationFrame(animate);
  }
  animate();
}

// Generate multiple circles with a time delay
for(let i=0; i<10; i++){
  setTimeout(createCircle, i * 300); // 300ms delay per circle
}
</script>
